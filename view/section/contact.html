{{define "contact.html"}}
<!-- Contact Section -->
<section id="contact" class="contact-section">
    <div class="container">
        <div class="section-header text-center">
            <h2>Get In Touch</h2>
            <div class="divider"></div>
            <p>Contact us to discuss how we can help your business leverage technology for growth</p>
        </div>
        
        <div class="contact-grid">
            <div class="contact-info">
                <div class="contact-info-card">
                    <h3>Contact Information</h3>
                    
                    <div class="contact-item">
                        <div class="contact-icon">
                            <i class="fas fa-map-marker-alt"></i>
                        </div>
                        <div class="contact-text">
                            <h4>Our Location</h4>
                            <p>{{.Company.Address}}</p>
                        </div>
                    </div>
                    
                    <div class="contact-item">
                        <div class="contact-icon">
                            <i class="fas fa-envelope"></i>
                        </div>
                        <div class="contact-text">
                            <h4>Email Us</h4>
                            <p>{{.Company.Email}}</p>
                        </div>
                    </div>
                    
                    <div class="contact-item">
                        <div class="contact-icon">
                            <i class="fas fa-phone"></i>
                        </div>
                        <div class="contact-text">
                            <h4>Call Us</h4>
                            <p>{{.Company.Phone}}</p>
                        </div>
                    </div>
                    
                    <!-- <div class="social-links">
                        <h4>Connect with {{.Owner.Name}}</h4>
                        <div class="social-icons">
                            <a href="{{.Owner.LinkedIn}}" target="_blank" class="social-icon" title="LinkedIn">
                                <i class="fab fa-linkedin-in"></i>
                            </a>
                            <a href="{{.Owner.GitHub}}" target="_blank" class="social-icon" title="Portfolio">
                                <i class="fab fa-github"></i>
                            </a>
                            <a href="mailto:{{.Owner.Email}}" class="social-icon" title="Email">
                                <i class="fas fa-envelope"></i>
                            </a>
                        </div>
                    </div> -->
                </div>
            </div>
            
            <div class="contact-form-container">
                <div class="contact-form-card">
                    <h3>Send us a message</h3>
                    <form id="contactForm" class="contact-form">
                        <div class="form-group">
                            <label for="name">Full Name</label>
                            <input type="text" id="name" name="name" placeholder="Your Name" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" placeholder="your.email@example.com" required>
                        </div>
                        <div class="form-group">
                            <label for="subject">Subject</label>
                            <input type="text" id="subject" name="subject" placeholder="How can we help you?" required>
                        </div>
                        <div class="form-group">
                            <label for="message">Message</label>
                            <textarea id="message" name="message" rows="4" placeholder="Tell us about your project or inquiry..." required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">Send Message</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{{end}}
