{{define "stats.html"}}
<!-- Stats Section -->
<section id="stats" class="stats-section">
    <div class="container">
        <div class="stats-grid">
            {{range .Stats}}
            <div class="stat-item text-center">
                <div class="stat-icon">
                    <i class="fas fa-{{.Icon}}"></i>
                </div>
                <div class="stat-number" data-count="{{.Number}}" data-suffix="{{.Suffix}}">0</div>
                <p class="stat-label">{{.Label}}</p>
            </div>
            {{end}}
        </div>
    </div>
</section>
{{end}}
